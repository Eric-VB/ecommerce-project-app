<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Loja</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- CABEÇALHO -->
    <header class="header">
        <div class="container">
            <h1>🛍️ Minha Loja</h1>
            <button class="cart-btn" onclick="toggleCarrinho()">
                🛒 Carrinho (<span id="cart-count">0</span>)
            </button>
        </div>
    </header>

    <!-- LISTA DE PRODUTOS -->
    <main class="container">
        <h2>Produtos Disponíveis</h2>
        <div id="produtos" class="produtos-grid">
            <!-- Produtos aparecem aqui -->
        </div>
    </main>

    <!-- MODAL DO CARRINHO -->
    <div id="cart-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Seu Carrinho</h2>
                <button class="close-btn" onclick="toggleCarrinho()">✕</button>
            </div>
            
            <div id="cart-items" class="cart-items-container">
                <!-- Items do carrinho aparecem aqui -->
            </div>
            
            <div id="cart-total" class="cart-total hidden">
                <p>Total: <strong id="total-price">R$ 0,00</strong></p>
                <button class="checkout-btn">Finalizar Compra</button>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/app.js"></script>
</body>
</html>
